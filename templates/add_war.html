{% extends "layout.html" %}

{% block content %}

<h1>➕ Añadir Guerra</h1>

<form method="POST" style="margin-top:20px;">

    <input name="rival" placeholder="Rival" required><br><br>

    <input name="liga" placeholder="Liga (Oro II, Platino...)" required><br><br>

    <input name="fecha" type="date" required><br><br>

    <select name="resultado" required>
        <option value="Victoria">Victoria</option>
        <option value="Derrota">Derrota</option>
    </select><br><br>

    <input name="fallos" type="number" placeholder="Fallos" required><br><br>

    <input name="defensas" type="number" placeholder="Defensas" required><br><br>

    <button type="submit" style="
        padding:10px 15px;
        background:#2ecc71;
        border:none;
        cursor:pointer;
    ">
        Guardar
    </button>

</form>

{% endblock %}
