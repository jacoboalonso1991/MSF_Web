{% extends "layout.html" %}

{% block content %}

<h1>👑 ADMIN PANEL</h1>

<div style="
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-top:30px;
">

    <div style="background:rgba(0,0,0,0.6); border:1px solid #2ecc71; padding:20px; border-radius:10px;">
        <h2>⚔️ Guerras</h2>
        <h1>{{ wars }}</h1>
    </div>

    <div style="background:rgba(0,0,0,0.6); border:1px solid #2ecc71; padding:20px; border-radius:10px;">
        <h2>🛡️ Counters</h2>
        <h1>{{ counters }}</h1>
    </div>

    <div style="background:rgba(0,0,0,0.6); border:1px solid #2ecc71; padding:20px; border-radius:10px;">
        <h2>🖼️ Infografías</h2>
        <h1>{{ infografias }}</h1>
    </div>

    <div style="background:rgba(0,0,0,0.6); border:1px solid #2ecc71; padding:20px; border-radius:10px;">
        <h2>👥 Miembros</h2>
        <h1>{{ members }}</h1>
    </div>

</div>

{% endblock %}
