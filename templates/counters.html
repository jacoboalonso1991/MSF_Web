{% extends "layout.html" %}

{% block content %}

<h1>🛡️ COUNTERS</h1>

<form method="GET" action="/counters">
    <input 
        type="text" 
        name="q" 
        value="{{ query }}" 
        placeholder="Buscar team"
        style="padding:10px; width:250px;"
    >
    <button type="submit">Buscar</button>
</form>

{% for item in teams %}

<a href="/team/{{ item.team | urlencode }}"
   style="
      display:block;
      padding:15px;
      margin:10px 0;
      background:#1b1b1b;
      border:2px solid #2ecc71;
      border-radius:8px;
      color:white;
      text-decoration:none;
      transition:0.2s;
   "
   onmouseover="this.style.background='#2ecc71';this.style.color='black';"
   onmouseout="this.style.background='#1b1b1b';this.style.color='white';"
>

    <div style="font-size:20px; font-weight:bold;">
        {{ item.team }}
    </div>

    <div style="font-size:14px; opacity:0.8;">
        {{ item.count }} variaciones
    </div>

</a>

{% endfor %}

{% endblock %}
