{% extends "layout.html" %}

<style>

.card-infografia{
    width:220px;
    display:inline-block;
    background:rgba(0,0,0,0.7);
    border:1px solid #2ecc71;
    border-radius:10px;
    padding:10px;
    text-align:center;

    transition: all 0.25s ease;
    transform: scale(1);
}

.card-infografia:hover{
    transform: scale(1.05);
    border:1px solid #58ff9a;
    box-shadow: 0 0 15px #2ecc71, 0 0 30px rgba(46,204,113,0.5);
    cursor:pointer;
}

</style>

{% block content %}

<h1>🖼️ INFOGRAFÍAS</h1>
<form method="GET" action="/infografias" style="margin-bottom:20px;">

    <input
        type="text"
        name="q"
        placeholder="🔍 Buscar equipo..."
        value="{{ query }}"
        style="
            padding:10px;
            width:300px;
            border-radius:6px;
            border:none;
        "
    >

    <button type="submit" style="
        padding:10px;
        background:#2ecc71;
        border:none;
        border-radius:6px;
        cursor:pointer;
    ">
        Buscar
    </button>

</form>

<a href="/add_infografia" style="
    display:inline-block;
    padding:10px 15px;
    background:#2ecc71;
    color:black;
    text-decoration:none;
    border-radius:5px;
    margin-bottom:20px;
">
    ➕ Añadir infografía
</a>

<div style="
    display:flex;
    flex-wrap:wrap;
    gap:20px;
">

{% for i in infografias %}

<a href="/infografia/{{ i['id'] }}" style="
    text-decoration:none;
    color:white;
">

    <div class="card-infografia">

        <img
            src="/static/images/{{ i['imagen'] }}"
            style="
                width:200px;
                height:120px;
                object-fit:cover;
                border-radius:5px;
            "
        >

        <p style="
            margin-top:10px;
            font-weight:bold;
        ">
            {{ i["nombre"] }}
        </p>

    </div>

</a>

{% endfor %}

</div>

{% endblock %}
