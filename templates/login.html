<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hulk AMB Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: url('/static/images/msf.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
        }

        .login-box {
            position: relative;
            z-index: 1;
            width: 320px;
            background: rgba(0,0,0,0.85);
            border: 2px solid #2ecc71;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }

        .login-box h1 {
            color: #2ecc71;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2ecc71;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #27ae60;
        }

        .logo {
            font-size: 22px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="overlay"></div>

<div class="login-box">

    <img src="/static/images/hulk_logo.png"
     style="width:140px;
            margin-bottom:10px;
            filter: drop-shadow(0 0 10px #2ecc71);">

    <h1>LOGIN</h1>

    <form method="POST">

        <input type="text" name="user" placeholder="Usuario" required>

        <input type="password" name="password" placeholder="Contraseña" required>

        <button type="submit">Entrar</button>

    </form>

</div>

</body>
</html>
