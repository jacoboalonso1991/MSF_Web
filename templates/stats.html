{% extends "layout.html" %}

{% block content %}

<h1>📊 Estadísticas</h1>

<div style="
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:30px;
">

    <div style="
        background:rgba(0,0,0,0.6);
        border:1px solid #2ecc71;
        padding:20px;
        border-radius:10px;
    ">
        <h2>⚔️ Guerras</h2>
        <h1>{{ total }}</h1>
    </div>

    <div style="
        background:rgba(0,0,0,0.6);
        border:1px solid #2ecc71;
        padding:20px;
        border-radius:10px;
    ">
        <h2>🏆 Victorias</h2>
        <h1>{{ victorias }}</h1>
    </div>

    <div style="
        background:rgba(0,0,0,0.6);
        border:1px solid #2ecc71;
        padding:20px;
        border-radius:10px;
    ">
        <h2>💀 Derrotas</h2>
        <h1>{{ derrotas }}</h1>
    </div>

    <div style="
        background:rgba(0,0,0,0.6);
        border:1px solid #2ecc71;
        padding:20px;
        border-radius:10px;
    ">
        <h2>📈 Win Rate</h2>
        <h1>{{ porcentaje }}%</h1>
    </div>

</div>

{% endblock %}
