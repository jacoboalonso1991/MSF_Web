{% extends "layout.html" %}

{% block content %}

<h1>🛡️ {{ team }}</h1>

<a href="/counters"
   style="
   display:inline-block;
   margin-bottom:20px;
   color:#2ecc71;
   text-decoration:none;
   ">
   ← Volver
</a>

{% for variation in variations %}

<div style="
background:rgba(0,0,0,0.6);
border:1px solid #2ecc71;
padding:15px;
margin-bottom:10px;
border-radius:8px;
">

    <a href="/variation/{{ team }}/{{ variation }}"
       style="
       color:white;
       text-decoration:none;
       font-size:20px;
       font-weight:bold;
       ">
       {{ variation }}
    </a>

</div>

{% endfor %}

{% endblock %}
